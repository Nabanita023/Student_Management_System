{% extends "base.html" %}

{% block title %}Update Enrollment{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h3 class="mb-0"><i class="fas fa-edit"></i> Update Enrollment</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="student_id" class="form-label">Student</label>
                        <select class="form-select" id="student_id" name="student_id" required>
                            <option value="">-- Select Student --</option>
                            {% for student in students %}
                                <option value="{{ student.id }}"
                                    {% if student.id == enrollment.student_id %}selected{% endif %}>
                                    {{ student.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="course_id" class="form-label">Course</label>
                        <select class="form-select" id="course_id" name="course_id" required>
                            <option value="">-- Select Course --</option>
                            {% for course in courses %}
                                <option value="{{ course.id }}"
                                    {% if course.id == enrollment.course_id %}selected{% endif %}>
                                    {{ course.course_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="grade" class="form-label">Grade</label>
                        <select class="form-select" id="grade" name="grade">
                            {% for g in ['Pending', 'A', 'B', 'C', 'D', 'F'] %}
                                <option value="{{ g }}"
                                    {% if enrollment.grade == g %}selected{% endif %}>
                                    {{ g }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-save"></i> Update Enrollment
                    </button>
                    <a href="{{ url_for('enrollments.list_enrollments') }}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
